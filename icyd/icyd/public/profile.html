<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>icyd.lol</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#080808;--card:#0f0f0f;--border:#1a1a1a;--text:#efefef;--muted:#444;--accent:#7c3aed;--accent2:#a78bfa;}
    html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;}

    .blob{position:fixed;border-radius:50%;filter:blur(140px);opacity:0.08;pointer-events:none;z-index:0;}
    .blob1{width:500px;height:500px;background:#7c3aed;top:-150px;left:-150px;}
    .blob2{width:300px;height:300px;background:#2563eb;bottom:-80px;right:-80px;}

    .card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 28px;width:100%;max-width:400px;text-align:center;animation:fadeUp 0.4s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    .avatar-wrap{position:relative;width:88px;height:88px;margin:0 auto 16px;}
    .avatar-wrap::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:linear-gradient(135deg,var(--accent),transparent 60%);z-index:0;}
    .avatar{width:88px;height:88px;border-radius:50%;object-fit:cover;position:relative;z-index:1;border:2px solid var(--bg);}

    .username{font-size:1.3rem;font-weight:700;letter-spacing:-0.01em;margin-bottom:4px;}
    .handle{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted);margin-bottom:14px;}

    .badges{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:0.65rem;font-weight:600;font-family:'DM Mono',monospace;}
    .badge-verified{background:#1e3a5f;color:#60a5fa;border:1px solid #1e40af;}
    .badge-premium{background:#3a2a00;color:#fbbf24;border:1px solid #92400e;}
    .badge-og{background:#2d1f5e;color:#a78bfa;border:1px solid #5b21b6;}
    .badge-staff{background:#3a0000;color:#f87171;border:1px solid #991b1b;}
    .badge-supporter{background:#003a3a;color:#22d3ee;border:1px solid #0e7490;}

    .bio{font-size:0.82rem;color:#888;line-height:1.6;margin-bottom:18px;font-family:'DM Mono',monospace;}

    .divider{width:100%;height:1px;background:var(--border);margin-bottom:16px;}

    .links{display:flex;flex-direction:column;gap:9px;width:100%;}
    .link-btn{display:flex;align-items:center;gap:12px;width:100%;padding:12px 16px;background:#141414;border:1px solid var(--border);border-radius:10px;text-decoration:none;color:var(--text);font-size:0.85rem;font-weight:600;font-family:'Syne',sans-serif;transition:all 0.15s;cursor:pointer;}
    .link-btn:hover{background:#1c1c1c;border-color:#2a2a2a;transform:translateY(-1px);}
    .link-icon{width:32px;height:32px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;}
    .link-arrow{margin-left:auto;color:var(--muted);font-size:0.75rem;}

    .views{margin-top:20px;font-family:'DM Mono',monospace;font-size:0.65rem;color:#2a2a2a;}

    .nav-link{position:fixed;top:20px;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted);text-decoration:none;z-index:100;background:var(--card);border:1px solid var(--border);padding:6px 14px;border-radius:999px;}
    .nav-link:hover{color:var(--text);}

    .not-found{text-align:center;z-index:1;position:relative;}
    .not-found h1{font-size:4rem;font-weight:800;color:var(--accent2);}
    .not-found p{color:var(--muted);font-family:'DM Mono',monospace;font-size:0.8rem;margin-top:8px;}
    .not-found a{display:inline-block;margin-top:20px;color:var(--accent2);font-family:'DM Mono',monospace;font-size:0.75rem;text-decoration:none;}
  </style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <a href="/" class="nav-link">icyd.lol</a>
  <div id="root"></div>

  <script>
    const BADGE_STYLES = {
      verified:  { cls:'badge-verified',  label:'✅ Verified'  },
      premium:   { cls:'badge-premium',   label:'👑 Premium'   },
      og:        { cls:'badge-og',        label:'⭐ OG'         },
      staff:     { cls:'badge-staff',     label:'🔥 Staff'     },
      supporter: { cls:'badge-supporter', label:'💎 Supporter' },
    };

    const slug = location.pathname.slice(1);

    async function load() {
      const res = await fetch(`/api/profile/${slug}`);
      const root = document.getElementById('root');
      if (!res.ok) {
        root.innerHTML = `<div class="not-found"><h1>404</h1><p>this profile doesn't exist</p><a href="/">← go home</a></div>`;
        document.title = '404 — icyd.lol';
        return;
      }
      const u = await res.json();
      document.title = `${u.username} — icyd.lol`;

      const badgesHTML = (u.badges || []).map(b => {
        const s = BADGE_STYLES[b];
        return s ? `<span class="badge ${s.cls}">${s.label}</span>` : '';
      }).join('');

      const linksHTML = (u.links || []).map(l =>
        `<a class="link-btn" href="${escHtml(l.url)}" target="_blank" rel="noopener">
          <div class="link-icon">${escHtml(l.icon || '🔗')}</div>
          <span>${escHtml(l.label)}</span>
          <span class="link-arrow">↗</span>
        </a>`
      ).join('');

      root.innerHTML = `
        <div class="card">
          <div class="avatar-wrap">
            <img class="avatar" src="${escHtml(u.avatar)}" alt="${escHtml(u.username)}"/>
          </div>
          <div class="username">${escHtml(u.username)}</div>
          <div class="handle">icyd.lol/${escHtml(u.slug)}</div>
          ${badgesHTML ? `<div class="badges">${badgesHTML}</div>` : ''}
          ${u.bio ? `<div class="bio">${escHtml(u.bio)}</div>` : ''}
          ${linksHTML ? `<div class="divider"></div><div class="links">${linksHTML}</div>` : ''}
          <div class="views">👁 ${u.views} views</div>
        </div>`;
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    load();
  </script>
</body>
</html>
