<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin Panel — icyd.lol</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#080808;--card:#0f0f0f;--border:#1a1a1a;--text:#efefef;--muted:#555;--accent:#7c3aed;}
    body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;}
    nav{padding:16px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--bg);}
    .logo{font-size:1rem;font-weight:800;color:var(--text);}
    .logo span{color:#a78bfa;}
    .badge-pill{background:#3a0000;color:#f87171;border:1px solid #7f1d1d;padding:3px 10px;border-radius:999px;font-family:'DM Mono',monospace;font-size:0.65rem;}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:'Syne',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;text-decoration:none;border:none;transition:all 0.15s;}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
    .btn-ghost:hover{color:var(--text);}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-primary:hover{background:#6d28d9;}
    .btn-sm{padding:5px 11px;font-size:0.72rem;}
    .btn-green{background:#14532d;color:#86efac;border:1px solid #15803d;}
    .btn-red{background:#3b0000;color:#f87171;border:1px solid #7f1d1d;}

    .container{max-width:900px;margin:0 auto;padding:40px 24px;}
    h2{font-size:1.4rem;font-weight:800;margin-bottom:6px;}
    .sub{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted);margin-bottom:32px;}

    .section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;}
    .section-title{font-size:0.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:18px;font-family:'DM Mono',monospace;}

    .badge-form{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
    label{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted);margin-bottom:5px;display:block;}
    input,select{background:#141414;border:1px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.82rem;outline:none;}
    input:focus,select:focus{border-color:var(--accent);}
    select option{background:#141414;}
    .form-group{display:flex;flex-direction:column;}

    .result-box{margin-top:14px;padding:12px 16px;border-radius:8px;font-family:'DM Mono',monospace;font-size:0.78rem;display:none;}
    .result-ok{background:#0f2d0f;border:1px solid #15803d;color:#86efac;}
    .result-err{background:#2d0f0f;border:1px solid #7f1d1d;color:#f87171;}

    table{width:100%;border-collapse:collapse;}
    th{text-align:left;font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);padding:8px 12px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.06em;}
    td{padding:10px 12px;border-bottom:1px solid #111;font-size:0.82rem;vertical-align:middle;}
    tr:last-child td{border:none;}
    .user-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;margin-right:8px;vertical-align:middle;}
    .badges-cell{display:flex;gap:4px;flex-wrap:wrap;}
    .badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:0.6rem;font-weight:600;font-family:'DM Mono',monospace;}
    .badge-verified{background:#1e3a5f;color:#60a5fa;border:1px solid #1e40af;}
    .badge-premium{background:#3a2a00;color:#fbbf24;border:1px solid #92400e;}
    .badge-og{background:#2d1f5e;color:#a78bfa;border:1px solid #5b21b6;}
    .badge-staff{background:#3a0000;color:#f87171;border:1px solid #991b1b;}
    .badge-supporter{background:#003a3a;color:#22d3ee;border:1px solid #0e7490;}
    .muted{color:var(--muted);font-family:'DM Mono',monospace;font-size:0.72rem;}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a1a;border:1px solid #2a2a2a;color:#ccc;font-family:'DM Mono',monospace;font-size:0.75rem;padding:10px 20px;border-radius:999px;transition:transform 0.25s,opacity 0.25s;opacity:0;pointer-events:none;z-index:1000;}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  </style>
</head>
<body>
  <nav>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="logo">icyd<span>.lol</span></div>
      <span class="badge-pill">🔥 Admin</span>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-ghost btn-sm" onclick="loadUsers()">↻ Refresh</button>
      <a href="/" class="btn btn-ghost btn-sm">← Site</a>
    </div>
  </nav>

  <div class="container">
    <h2>Admin Panel</h2>
    <p class="sub">manage users and badges — icyd.lol staff only</p>

    <!-- Give / Remove Badge -->
    <div class="section">
      <div class="section-title">Manage Badges</div>
      <div class="badge-form">
        <div class="form-group">
          <label>Username (slug)</label>
          <input id="slugInput" type="text" placeholder="e.g. tig" style="width:180px;"/>
        </div>
        <div class="form-group">
          <label>Badge</label>
          <select id="badgeSelect">
            <option value="verified">✅ Verified</option>
            <option value="premium">👑 Premium</option>
            <option value="og">⭐ OG</option>
            <option value="staff">🔥 Staff</option>
            <option value="supporter">💎 Supporter</option>
          </select>
        </div>
        <button class="btn btn-green btn-sm" onclick="manageBadge('add')" style="height:38px;">+ Give Badge</button>
        <button class="btn btn-red btn-sm" onclick="manageBadge('remove')" style="height:38px;">✕ Remove Badge</button>
      </div>
      <div class="result-box" id="result"></div>
    </div>

    <!-- Users Table -->
    <div class="section">
      <div class="section-title">All Users</div>
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>URL</th>
            <th>Badges</th>
            <th>Views</th>
            <th>Joined</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="usersTable">
          <tr><td colspan="6" class="muted" style="text-align:center;padding:20px;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const BADGE_STYLES = {
      verified:  {cls:'badge-verified',label:'✅'},
      premium:   {cls:'badge-premium',label:'👑'},
      og:        {cls:'badge-og',label:'⭐'},
      staff:     {cls:'badge-staff',label:'🔥'},
      supporter: {cls:'badge-supporter',label:'💎'},
    };

    async function manageBadge(action) {
      const slug = document.getElementById('slugInput').value.trim();
      const badge = document.getElementById('badgeSelect').value;
      if (!slug) return showResult('error', 'Enter a username');

      const res = await fetch('/admin/api/badge', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({slug,badge,action})
      });
      const data = await res.json();
      const box = document.getElementById('result');
      if (data.error) {
        showResult('error', '❌ ' + data.error);
      } else {
        showResult('ok', `✅ Badge ${action === 'add' ? 'added' : 'removed'} for @${slug}`);
        loadUsers();
      }
    }

    function showResult(type, msg) {
      const box = document.getElementById('result');
      box.textContent = msg;
      box.className = 'result-box ' + (type === 'ok' ? 'result-ok' : 'result-err');
      box.style.display = 'block';
      setTimeout(() => box.style.display = 'none', 3000);
    }

    async function loadUsers() {
      const res = await fetch('/admin/api/users');
      const users = await res.json();
      const tbody = document.getElementById('usersTable');
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="muted" style="text-align:center;padding:20px;">No users yet</td></tr>';
        return;
      }
      tbody.innerHTML = users.map(u => `
        <tr>
          <td style="font-weight:600;">${esc(u.username)}</td>
          <td class="muted">/${esc(u.slug||'—')}</td>
          <td>
            <div class="badges-cell">
              ${(u.badges||[]).map(b => {
                const s = BADGE_STYLES[b];
                return s ? `<span class="badge ${s.cls}">${s.label}</span>` : '';
              }).join('')}
              ${!(u.badges||[]).length ? '<span class="muted">none</span>' : ''}
            </div>
          </td>
          <td class="muted">${u.views}</td>
          <td class="muted">${new Date(u.created_at).toLocaleDateString()}</td>
          <td>
            <button class="btn btn-ghost btn-sm" onclick="quickBadge('${esc(u.slug)}')">manage</button>
          </td>
        </tr>
      `).join('');
    }

    function quickBadge(slug) {
      document.getElementById('slugInput').value = slug;
      document.getElementById('slugInput').focus();
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadUsers();
  </script>
</body>
</html>
