<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin — icyd.lol</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:#080808;color:#efefef;font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{background:#0f0f0f;border:1px solid #1a1a1a;border-radius:14px;padding:32px 28px;width:100%;max-width:340px;text-align:center;}
    h1{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:6px;}
    p{font-size:0.7rem;color:#444;margin-bottom:24px;}
    input{width:100%;background:#141414;border:1px solid #1a1a1a;border-radius:8px;padding:11px 14px;color:#efefef;font-family:'DM Mono',monospace;font-size:0.85rem;outline:none;margin-bottom:12px;}
    input:focus{border-color:#7c3aed;}
    button{width:100%;background:#7c3aed;border:none;border-radius:8px;padding:11px;color:#fff;font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;}
    button:hover{background:#6d28d9;}
    .error{color:#f87171;font-size:0.7rem;margin-top:10px;}
  </style>
</head>
<body>
  <div class="card">
    <h1>admin panel</h1>
    <p>icyd.lol — staff only</p>
    <form method="POST" action="/admin/login">
      <input type="password" name="password" placeholder="password" autofocus/>
      <button type="submit">Enter</button>
      <div class="error" id="err" style="display:none">wrong password</div>
    </form>
  </div>
  <script>
    if(location.search.includes('error')) document.getElementById('err').style.display='block';
  </script>
</body>
</html>
